name: CI/CD Pipeline Production

on:
  push:
    branches:
      - main

jobs:
  build-app:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Artifact
        run: |
          mkdir dist
          echo "<h1>Deployment Otomatis Berhasil</h1>" > dist/index.html

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hasil-build-web
          path: dist/
          retention-days: 7

  deploy-to-vps:
    runs-on: ubuntu-latest
    needs: build-app

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: hasil-build-web
          path: dist/

      - name: Copy Artifact to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "dist/*"
          target: "/home/${{ secrets.SERVER_USERNAME }}/deploy-artifact"

      - name: Execute Command via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "Deploy Berhasil"
            ls -la /home/${{ secrets.SERVER_USERNAME }}/deploy-artifact